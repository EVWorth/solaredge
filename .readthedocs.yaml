version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"

  jobs:
    pre_install:
      # Install uv and use full path for subsequent commands
      - curl -LsSf https://astral.sh/uv/install.sh | sh
      - $HOME/.local/bin/uv python install 3.13
      - $HOME/.local/bin/uv sync --frozen
      
      # Install the package in editable mode so importlib.metadata can find it
      - $HOME/.local/bin/uv pip install -e .
      
      # Activate the venv (POSIX-compatible way)
      - . .venv/bin/activate

sphinx:
  configuration: docs/conf.py